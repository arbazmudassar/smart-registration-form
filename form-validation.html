<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid bg-primary text-white p-4 mb-4 text-center">
        <h1>Form Validation</h1>
    </div>
    <div class="container">
        <form class="form-control shadow-lg form" novalidate>

            <div>
                <h3 class="text-center mb-3 fw-bold">Registration Form</h3>
            </div>
        
            <label for="name" class="form-label mt-3 fw-bold">Full Name</label>
            <input type="text" class="form-control" id="name" required>
            <div class="invalid-feedback">Enter a valid name.</div>

            <label for="email" class="form-label mt-3 fw-bold">Email Address</label>
            <input type="email" class="form-control" id="email" required>
            <div class="invalid-feedback">Enter valid email address.</div>

            <label for="password" class="form-label mt-3 fw-bold">Password</label>
            <input type="password" class="form-control" id="password" required>
            <div class="invalid-feedback">Atleast 8 digits.</div>

            <label for="confirm-pass" class="form-label mt-3 fw-bold">Confirm Password</label>
            <input type="password" class="form-control" id="confirm-pass" required>
            <div class="invalid-feedback">Password must match.</div>

            <label for="phone" class="form-label mt-3 fw-bold">Phone Number</label>
            <input type="tel" class="form-control" id="phone" required>
            <div class="invalid-feedback">Must be 11-digit Phone Number.</div>

            <label for="gender" class="form-label fw-bold mt-3" >Gender</label><br>
            <input type="radio" name="gender" value="prefer-not-say">Prefer not to say
            <input type="radio" name="gender" value="male" class="ms-3"> Male
            <input type="radio" name="gender" value="female" class="ms-3"> Female<br>
            <div id="gender-error" class="text-danger"></div>
            
            <label for="country" class="form-label mt-3 fw-bold">Country</label>
            <select class="form-select" id="country" required>
                <option value="">Select Country</option>
                <option>Pakistan</option>
                <option>USA</option>
                <option>UK</option>
                <option>UAE</option>
                <option>KSA</option>
            </select>
            <div class="invalid-feedback">Select a country.</div>

            <input type="checkbox" id="terms">
            <label class="form-label mt-3 fw-bold" for="terms">Terms & Conditions</label><br>
            <div id="terms-error" class="text-danger"></div>

            <button type="submit" class="btn btn-primary mt-3" disabled>Submit</button>
            <div id="successMsg" class="alert alert-success mt-3 d-none">
            Form submitted successfully!
            </div>
        </form>
    </div>
    <footer class="bg-secondary mt-5 text-center text-white p-5">
        <p>&copy; 2026 Registration Form Validation</p>
    </footer>
    <script src="form-validate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
